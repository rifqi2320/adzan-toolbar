name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create, for example v0.0.4
        required: true
        type: string
      release_notes:
        description: Optional release notes. Leave empty to use the default template.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Fail if release already exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          gh release view "$env:VERSION" --repo "$env:REPOSITORY" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $env:VERSION already exists."
            exit 1
          }

      - name: Restore dependencies
        run: dotnet restore -r win-x64

      - name: Install WiX tool
        run: |
          dotnet clean -c Release -r win-x64
          dotnet tool install --global wix --version 5.0.2
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish framework-dependent build
        run: |
          Remove-Item artifacts/framework-dependent -Recurse -Force -ErrorAction SilentlyContinue
          dotnet clean -c Release -r win-x64
          dotnet publish -c Release -r win-x64 --self-contained false /p:PublishSingleFile=false /p:DebugType=None /p:DebugSymbols=false -o artifacts/framework-dependent

      - name: Publish self-contained build
        run: |
          Remove-Item artifacts/self-contained -Recurse -Force -ErrorAction SilentlyContinue
          dotnet clean -c Release -r win-x64
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:DebugType=None /p:DebugSymbols=false -o artifacts/self-contained

      - name: Build MSI installer
        env:
          PRODUCT_VERSION: ${{ inputs.version }}
        run: |
          $normalizedVersion = $env:PRODUCT_VERSION.TrimStart('v')
          Remove-Item artifacts/release -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path artifacts/release | Out-Null
          wix build `
            -arch x64 `
            -d PublishDir="$pwd\artifacts\framework-dependent" `
            -d ProductVersion="$normalizedVersion" `
            -o artifacts\release\AdzanToolbar-win-x64-installer.msi `
            Installer\Product.wxs

      - name: Prepare release assets
        run: |
          Copy-Item artifacts/self-contained/AdzanToolbar.exe artifacts/release/AdzanToolbar-win-x64-standalone.exe

      - name: Validate release asset sizes
        run: |
          $msiSize = (Get-Item artifacts/release/AdzanToolbar-win-x64-installer.msi).Length
          $standaloneSize = (Get-Item artifacts/release/AdzanToolbar-win-x64-standalone.exe).Length

          Write-Host "MSI size: $msiSize bytes"
          Write-Host "Standalone exe size: $standaloneSize bytes"

          if ($msiSize -lt 50000 -or $msiSize -gt 10000000) {
            Write-Host "MSI package size is outside the expected range."
            exit 1
          }

          if ($standaloneSize -lt 40000000 -or $standaloneSize -gt 120000000) {
            Write-Host "Standalone package size is outside the expected range."
            exit 1
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adzan-toolbar-${{ inputs.version }}
          path: |
            artifacts/release/AdzanToolbar-win-x64-installer.msi
            artifacts/release/AdzanToolbar-win-x64-standalone.exe

      - name: Prepare release notes
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if ($env:RELEASE_NOTES) {
            Set-Content -Path RELEASE_NOTES.md -Value $env:RELEASE_NOTES
            exit 0
          fi

          @"
          Release $env:VERSION

          Assets:
          - AdzanToolbar-win-x64-installer.msi: Windows installer, requires .NET 8 Windows Desktop Runtime
          - AdzanToolbar-win-x64-standalone.exe: larger single-file build with runtime included
          "@ | Set-Content -Path RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "$env:VERSION" `
            artifacts/release/AdzanToolbar-win-x64-installer.msi `
            artifacts/release/AdzanToolbar-win-x64-standalone.exe `
            --repo "$env:REPOSITORY" `
            --target "$env:GITHUB_SHA" `
            --title "$env:VERSION" `
            --notes-file RELEASE_NOTES.md
