name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create, for example v0.0.4
        required: true
        type: string
      release_notes:
        description: Optional release notes. Leave empty to use the default template.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Fail if release already exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "$VERSION" --repo "$REPOSITORY" >/dev/null 2>&1; then
            echo "Release $VERSION already exists."
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore -r win-x64

      - name: Publish framework-dependent build
        run: |
          rm -rf artifacts/framework-dependent
          dotnet clean -c Release -r win-x64
          dotnet publish -c Release -r win-x64 --self-contained false /p:PublishSingleFile=false /p:DebugType=None /p:DebugSymbols=false -o artifacts/framework-dependent

      - name: Publish self-contained build
        run: |
          rm -rf artifacts/self-contained
          dotnet clean -c Release -r win-x64
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:DebugType=None /p:DebugSymbols=false -o artifacts/self-contained

      - name: Prepare release assets
        run: |
          rm -rf artifacts/release
          mkdir -p artifacts/release
          (
            cd artifacts/framework-dependent
            zip -9 ../release/AdzanToolbar-win-x64-framework-dependent.zip \
              AdzanToolbar.exe \
              AdzanToolbar.dll \
              AdzanToolbar.deps.json \
              AdzanToolbar.runtimeconfig.json
          )
          cp artifacts/self-contained/AdzanToolbar.exe artifacts/release/AdzanToolbar-win-x64-self-contained.exe

      - name: Validate release asset sizes
        run: |
          framework_zip_size=$(stat -c%s artifacts/release/AdzanToolbar-win-x64-framework-dependent.zip)
          self_contained_size=$(stat -c%s artifacts/release/AdzanToolbar-win-x64-self-contained.exe)

          echo "Framework-dependent zip size: $framework_zip_size bytes"
          echo "Self-contained exe size: $self_contained_size bytes"

          if [ "$framework_zip_size" -gt 5000000 ]; then
            echo "Framework-dependent package is unexpectedly large."
            exit 1
          fi

          if [ "$self_contained_size" -lt 40000000 ] || [ "$self_contained_size" -gt 120000000 ]; then
            echo "Self-contained package size is outside the expected range."
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adzan-toolbar-${{ inputs.version }}
          path: |
            artifacts/release/AdzanToolbar-win-x64-framework-dependent.zip
            artifacts/release/AdzanToolbar-win-x64-self-contained.exe

      - name: Prepare release notes
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if [ -n "$RELEASE_NOTES" ]; then
            printf '%s\n' "$RELEASE_NOTES" > RELEASE_NOTES.md
            exit 0
          fi

          cat > RELEASE_NOTES.md <<EOF
          Release $VERSION

          Assets:
          - AdzanToolbar-win-x64-framework-dependent.zip: small build, requires .NET 8 Windows Desktop Runtime
          - AdzanToolbar-win-x64-self-contained.exe: larger single-file build with runtime included
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "$VERSION" \
            artifacts/release/AdzanToolbar-win-x64-framework-dependent.zip \
            artifacts/release/AdzanToolbar-win-x64-self-contained.exe \
            --repo "$REPOSITORY" \
            --target "${GITHUB_SHA}" \
            --title "$VERSION" \
            --notes-file RELEASE_NOTES.md
